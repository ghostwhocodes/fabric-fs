name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  workspace:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libfuse3-dev \
            protobuf-compiler

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo tools
        run: |
          set -euo pipefail
          cargo install just --locked
          cargo install cargo-llvm-cov --locked

      - name: Workspace gate
        run: just ci

      - name: Unfiltered coverage snapshot
        if: always()
        run: just coverage-full-summary
